<!DOCTYPE html>
<html>
<head>
  <title>ESP32 LED Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial; background: #0f0f1a; color: white;
           min-height: 100vh; padding: 20px; }
    h1 { text-align: center; color: #00d4ff;
         padding: 20px 0; font-size: 1.8em; }
    .status-bar { display: flex; justify-content: center;
                  gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
    .status-pill { background: #1a1a2e; border-radius: 20px;
                   padding: 8px 16px; font-size: 0.85em;
                   border: 1px solid #2a2a4a;
                   display: flex; align-items: center; gap: 8px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .online     { background: #00ff88; }
    .offline    { background: #ff4444; }
    .connecting { background: #ffaa00; }
    .grid { display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px; max-width: 700px; margin: 0 auto; }
    .card { background: #1a1a2e; border-radius: 16px;
            padding: 24px 16px; text-align: center;
            border: 1px solid #2a2a4a; transition: border-color 0.3s; }
    .card.active { border-color: #00ff88; }
    .led-icon { font-size: 2.5em; margin-bottom: 10px; }
    .name { font-size: 1em; font-weight: bold;
            margin-bottom: 12px; color: #ccc; }
    .badge { display: inline-block; padding: 4px 14px;
             border-radius: 20px; font-size: 0.85em;
             font-weight: bold; margin-bottom: 16px; }
    .on-badge  { background: #00ff8822; color: #00ff88;
                 border: 1px solid #00ff88; }
    .off-badge { background: #ff444422; color: #ff4444;
                 border: 1px solid #ff4444; }
    .toggle { width: 100%; padding: 12px; border: none;
              border-radius: 10px; font-size: 1em;
              cursor: pointer; font-weight: bold;
              transition: all 0.2s; }
    .toggle.on  { background: #ff4444; color: white; }
    .toggle.off { background: #00ff88; color: #000; }
    .toggle:disabled { opacity: 0.4; cursor: not-allowed; }
    .footer { text-align: center; margin-top: 30px;
              color: #444; font-size: 0.8em; }
  </style>
</head>
<body>
  <h1>💡 ESP32-S3 LED Control</h1>
  <div class="status-bar">
    <div class="status-pill">
      <div class="dot connecting" id="broker-dot"></div>
      <span id="broker-status">Connecting...</span>
    </div>
    <div class="status-pill">
      <div class="dot offline" id="esp-dot"></div>
      <span id="esp-status">ESP32: Unknown</span>
    </div>
  </div>
  <div class="grid" id="grid"></div>
  <p class="footer">ESP32-S3 + W5500 + HiveMQ Public Broker</p>

  <script>
    // ── Public HiveMQ — no credentials needed ──
    const BROKER = "broker.hivemq.com";
    const PORT   = 8884;  // WebSocket port

    const leds = [
      { name: "LED 1", topic: "sanjana101202/gpio/1", state: 0 },
      { name: "LED 2", topic: "sanjana101202/gpio/2", state: 0 },
      { name: "LED 3", topic: "sanjana101202/gpio/3", state: 0 },
      { name: "LED 4", topic: "sanjana101202/gpio/4", state: 0 },
    ];

    // Build UI
    const grid = document.getElementById("grid");
    leds.forEach((led, i) => {
      grid.innerHTML += `
        <div class="card" id="card-${i}">
          <div class="led-icon">💡</div>
          <div class="name">${led.name}</div>
          <div class="badge off-badge" id="badge-${i}">OFF</div>
          <button class="toggle off" id="btn-${i}"
                  onclick="toggle(${i})" disabled>
            Turn ON
          </button>
        </div>`;
    });

    // Connect MQTT
    const client = mqtt.connect(`wss://${BROKER}:${PORT}/mqtt`, {
      clientId: "web-" + Math.random().toString(16).substr(2, 8),
      reconnectPeriod: 3000,
    });

    client.on("connect", () => {
      setBrokerStatus("Connected ✅", "online");
      leds.forEach((l, i) => {
        client.subscribe(`sanjana101202/gpio/${i+1}/state`);
      });
      client.subscribe("sanjana101202/status");
      leds.forEach((l, i) => {
        document.getElementById(`btn-${i}`).disabled = false;
      });
    });

    client.on("offline",   () => setBrokerStatus("Offline ❌", "offline"));
    client.on("reconnect", () => setBrokerStatus("Reconnecting...", "connecting"));

    client.on("message", (topic, message) => {
      const msg = message.toString();
      if (topic === "sanjana101202/status") {
        const online = msg === "online";
        document.getElementById("esp-dot").className =
          "dot " + (online ? "online" : "offline");
        document.getElementById("esp-status").innerText =
          "ESP32: " + (online ? "Online ✅" : "Offline ❌");
        return;
      }
      const match = topic.match(/sanjana101202\/gpio\/(\d)\/state/);
      if (match) {
        updateUI(parseInt(match[1]) - 1, msg === "1");
      }
    });

    function toggle(i) {
      const newState = leds[i].state ? 0 : 1;
      client.publish(leds[i].topic, newState ? "1" : "0",
                     { retain: true });
      updateUI(i, newState);
    }

    function updateUI(i, state) {
      leds[i].state = state ? 1 : 0;
      const badge = document.getElementById(`badge-${i}`);
      const btn   = document.getElementById(`btn-${i}`);
      const card  = document.getElementById(`card-${i}`);
      badge.className = state ? "badge on-badge" : "badge off-badge";
      badge.innerText = state ? "ON" : "OFF";
      btn.className   = "toggle " + (state ? "on" : "off");
      btn.innerText   = state ? "Turn OFF" : "Turn ON";
      card.classList.toggle("active", state == 1);
    }

    function setBrokerStatus(text, type) {
      document.getElementById("broker-dot").className = "dot " + type;
      document.getElementById("broker-status").innerText = text;
    }
  </script>
</body>
</html>
