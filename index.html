<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESP32 Control</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0a0e17;
      --panel:     #0f1623;
      --border:    #1e2d45;
      --on:        #00f5a0;
      --off:       #ff3c5f;
      --idle:      #1e3a5f;
      --text:      #c8dff5;
      --dim:       #4a6a8a;
      --glow-on:   0 0 24px #00f5a080, 0 0 60px #00f5a030;
      --glow-off:  0 0 24px #ff3c5f80, 0 0 60px #ff3c5f30;
    }
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
 
    /* grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
 
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 48px 56px;
      width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      position: relative;
    }
 
    /* corner accents */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border-color: var(--on);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
 
    .header { text-align: center; }
 
    .title {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--on);
      text-shadow: 0 0 20px #00f5a060;
    }
 
    .subtitle {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 3px;
      margin-top: 6px;
    }
 
    /* connection status */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--dim);
      width: 100%;
    }
 
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--off);
      transition: background 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }
    .dot.connected {
      background: var(--on);
      box-shadow: 0 0 10px var(--on);
      animation: pulse 2s infinite;
    }
 
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }
 
    /* GPIO info */
    .gpio-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--dim);
      text-align: center;
    }
 
    /* toggle button */
    .toggle-btn {
      width: 160px; height: 160px;
      border-radius: 50%;
      border: 2px solid var(--idle);
      background: transparent;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.1s;
      position: relative;
      outline: none;
    }
 
    .toggle-btn::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid var(--idle);
      transition: border-color 0.3s;
    }
 
    .toggle-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
 
    .toggle-btn:not(:disabled):hover {
      transform: scale(1.04);
    }
 
    .toggle-btn:not(:disabled):active {
      transform: scale(0.97);
    }
 
    .toggle-btn.on {
      border-color: var(--on);
      box-shadow: var(--glow-on);
    }
    .toggle-btn.on::before { border-color: var(--on); }
 
    .toggle-btn.off {
      border-color: var(--off);
      box-shadow: var(--glow-off);
    }
    .toggle-btn.off::before { border-color: var(--off); }
 
    .btn-icon {
      font-size: 40px;
      line-height: 1;
      transition: color 0.3s;
      color: var(--dim);
    }
    .toggle-btn.on  .btn-icon { color: var(--on); text-shadow: 0 0 16px var(--on); }
    .toggle-btn.off .btn-icon { color: var(--off); text-shadow: 0 0 16px var(--off); }
 
    .btn-state {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--dim);
      transition: color 0.3s;
    }
    .toggle-btn.on  .btn-state { color: var(--on); }
    .toggle-btn.off .btn-state { color: var(--off); }
 
    /* log */
    .log {
      width: 100%;
      background: #060a10;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 12px;
      font-size: 10px;
      color: var(--dim);
      height: 72px;
      overflow-y: auto;
      letter-spacing: 1px;
      line-height: 1.7;
    }
 
    .log-entry { color: var(--dim); }
    .log-entry.send { color: var(--on); }
    .log-entry.recv { color: #5bc8ff; }
    .log-entry.err  { color: var(--off); }
 
    /* scrollbar */
    .log::-webkit-scrollbar { width: 3px; }
    .log::-webkit-scrollbar-track { background: transparent; }
    .log::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>
 
<div class="card">
  <div class="header">
    <div class="title">ESP32</div>
    <div class="subtitle">REMOTE CONTROL PANEL</div>
  </div>
 
  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">CONNECTING...</span>
  </div>
 
  <div class="gpio-label">GPIO PIN 12</div>
 
  <button class="toggle-btn" id="toggleBtn" disabled onclick="toggle()">
    <span class="btn-icon">⏻</span>
    <span class="btn-state" id="btnLabel">---</span>
  </button>
 
  <div class="log" id="log"></div>
</div>
 
<script>
  const BROKER   = 'wss://broker.hivemq.com:8884/mqtt';
  const PUB      = 'tuberocker_esp/gpio12';
  const SUB      = 'tuberocker_esp';
  const CLIENT_ID = 'web_ctrl_' + Math.random().toString(16).slice(2, 8);
 
  let pinState = false;
  let client;
 
  const dot       = document.getElementById('dot');
  const statusTxt = document.getElementById('status-text');
  const btn       = document.getElementById('toggleBtn');
  const btnLabel  = document.getElementById('btnLabel');
  const logEl     = document.getElementById('log');
 
  function log(msg, type = '') {
    const now = new Date().toLocaleTimeString();
    const el = document.createElement('div');
    el.className = 'log-entry ' + type;
    el.textContent = `[${now}] ${msg}`;
    logEl.appendChild(el);
    logEl.scrollTop = logEl.scrollHeight;
  }
 
  function setConnected(connected) {
    dot.className = 'dot' + (connected ? ' connected' : '');
    statusTxt.textContent = connected ? 'BROKER CONNECTED' : 'DISCONNECTED';
    btn.disabled = !connected;
    if (!connected) {
      btn.className = 'toggle-btn';
      btnLabel.textContent = '---';
    }
  }
 
  function updateButton(state) {
    pinState = state;
    btn.className = 'toggle-btn ' + (state ? 'on' : 'off');
    btnLabel.textContent = state ? 'HIGH' : 'LOW';
  }
 
  function toggle() {
    const next = !pinState;
    const msg  = next ? '1' : '0';
    client.publish(PUB, msg, { qos: 0 }, (err) => {
      if (err) {
        log('Publish failed: ' + err.message, 'err');
      } else {
        updateButton(next);
        log(`SENT → ${PUB} : ${msg}`, 'send');
      }
    });
  }
 
  function connect() {
    log('Connecting to broker...');
    client = mqtt.connect(BROKER, {
      clientId: CLIENT_ID,
      clean: true,
      reconnectPeriod: 3000,
    });
 
    client.on('connect', () => {
      setConnected(true);
      updateButton(false);
      log('Connected as ' + CLIENT_ID, 'recv');
      client.subscribe(SUB, { qos: 0 });
    });
 
    client.on('message', (topic, message) => {
      const msg = message.toString();
      log(`RECV ← ${topic} : ${msg}`, 'recv');
    });
 
    client.on('disconnect', () => {
      setConnected(false);
      log('Disconnected', 'err');
    });
 
    client.on('error', (err) => {
      log('Error: ' + err.message, 'err');
    });
 
    client.on('reconnect', () => {
      log('Reconnecting...');
    });
  }
 
  connect();
</script>
</body>
</html>
