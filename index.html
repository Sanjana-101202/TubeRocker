<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUBE ROCKER — Control Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #080b0f;
    --surface:  #0e1318;
    --border:   #1e2830;
    --amber:    #f59e0b;
    --amber-dim:#7c4f07;
    --green:    #22c55e;
    --red:      #ef4444;
    --blue:     #38bdf8;
    --muted:    #4a5568;
    --text:     #c8d6e5;
    --text-dim: #5a6a7a;
    --mono:     'Share Tech Mono', monospace;
    --display:  'Orbitron', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── TOP BAR ─────────────────────────────────────────────────── */
  #topbar {
    background: var(--surface);
    border-bottom: 2px solid var(--amber);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 900;
    color: var(--amber);
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 1;
  }
  .logo span {
    font-size: 10px;
    letter-spacing: 6px;
    color: var(--muted);
    display: block;
    margin-top: 2px;
  }

  .status-cluster {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .dot.green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.amber  { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: pulse 1s infinite; }
  .dot.red    { background: var(--red);   box-shadow: 0 0 6px var(--red); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── MAIN GRID ───────────────────────────────────────────────── */
  #app {
    display: grid;
    grid-template-columns: 320px 1fr 300px;
    grid-template-rows: auto auto;
    gap: 12px;
    padding: 12px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── PANELS ──────────────────────────────────────────────────── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .panel-header {
    background: #0a1015;
    border-bottom: 1px solid var(--border);
    padding: 6px 12px;
    font-family: var(--display);
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--amber);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-body { padding: 12px; }

  /* ── MODE SELECTOR ───────────────────────────────────────────── */
  #mode-panel { grid-column: 1; grid-row: 1 / 3; }

  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }

  .mode-btn {
    background: #0a1015;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px 6px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .mode-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--amber);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .mode-btn:hover::after { opacity: 0.05; }
  .mode-btn.active {
    border-color: var(--amber);
    background: rgba(245,158,11,0.08);
  }
  .mode-btn.active .mode-name { color: var(--amber); }
  .mode-btn.locked { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

  .mode-name {
    font-family: var(--display);
    font-size: 14px;
    font-weight: 800;
    color: var(--text);
    display: block;
    margin-bottom: 3px;
  }
  .mode-tag {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.5px;
    line-height: 1.3;
    display: block;
  }

  .mode-desc {
    margin-top: 10px;
    padding: 10px;
    background: #0a1015;
    border: 1px solid var(--border);
    border-left: 3px solid var(--amber);
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.6;
    min-height: 56px;
  }
  .mode-desc strong { color: var(--amber); }

  /* Motor controls */
  .ctrl-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }

  .btn {
    padding: 12px;
    border: 1px solid;
    border-radius: 2px;
    cursor: pointer;
    font-family: var(--display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.15s;
    background: transparent;
  }
  .btn-start {
    border-color: var(--green);
    color: var(--green);
  }
  .btn-start:hover:not(:disabled) {
    background: rgba(34,197,94,0.12);
    box-shadow: 0 0 12px rgba(34,197,94,0.2);
  }
  .btn-stop {
    border-color: var(--red);
    color: var(--red);
  }
  .btn-stop:hover:not(:disabled) {
    background: rgba(239,68,68,0.12);
    box-shadow: 0 0 12px rgba(239,68,68,0.2);
  }
  .btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }
  .btn-full {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
  }
  .btn-amber {
    border-color: var(--amber);
    color: var(--amber);
  }
  .btn-amber:hover:not(:disabled) {
    background: rgba(245,158,11,0.1);
  }
  .btn-blue {
    border-color: var(--blue);
    color: var(--blue);
  }
  .btn-blue:hover:not(:disabled) {
    background: rgba(56,189,248,0.1);
  }

  /* ── MIDDLE COLUMN ───────────────────────────────────────────── */
  #mid-col {
    grid-column: 2;
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Progress / Status */
  .big-countdown {
    font-family: var(--display);
    font-size: 64px;
    font-weight: 900;
    color: var(--amber);
    text-align: center;
    letter-spacing: 8px;
    line-height: 1;
    padding: 16px 0 8px;
    text-shadow: 0 0 30px rgba(245,158,11,0.4);
    transition: color 0.3s;
  }
  .big-countdown.stopped { color: var(--muted); text-shadow: none; }
  .big-countdown.completed { color: var(--green); text-shadow: 0 0 30px rgba(34,197,94,0.4); }

  .seg-label {
    text-align: center;
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .seg-label .seg-hi { color: var(--amber); font-weight: bold; }

  .progress-track {
    height: 6px;
    background: var(--border);
    border-radius: 0;
    margin: 0 12px 12px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--amber-dim), var(--amber));
    width: 0%;
    transition: width 0.5s linear;
    box-shadow: 2px 0 8px var(--amber);
  }

  /* Config */
  .cfg-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-group.full { grid-column: 1 / -1; }

  label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    background: var(--border);
    outline: none;
    border-radius: 0;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--amber);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 6px var(--amber);
  }

  input[type=text], input[type=number] {
    background: #0a1015;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 6px 8px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]:focus, input[type=number]:focus {
    border-color: var(--amber);
  }
  input.warn { border-color: var(--red) !important; }

  .val-display {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 700;
    color: var(--amber);
    text-align: right;
    min-width: 48px;
  }

  .range-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toggle-row {
    display: flex;
    gap: 6px;
  }
  .dir-btn {
    flex: 1;
    padding: 8px;
    border: 1px solid var(--border);
    background: #0a1015;
    color: var(--text-dim);
    font-family: var(--display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    border-radius: 2px;
  }
  .dir-btn.active-fwd { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.08); }
  .dir-btn.active-rev { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.08); }

  .warn-box {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.4);
    border-left: 3px solid var(--red);
    padding: 6px 10px;
    font-size: 11px;
    color: #fca5a5;
    border-radius: 2px;
    display: none;
    line-height: 1.5;
  }
  .warn-box.show { display: block; }

  /* ── RIGHT COLUMN ────────────────────────────────────────────── */
  #right-col {
    grid-column: 3;
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Activity log */
  #log-body {
    height: 280px;
    overflow-y: auto;
    font-size: 11px;
    line-height: 1.8;
    padding: 8px;
    background: #060a0d;
  }
  #log-body::-webkit-scrollbar { width: 4px; }
  #log-body::-webkit-scrollbar-track { background: transparent; }
  #log-body::-webkit-scrollbar-thumb { background: var(--border); }

  .log-entry { display: flex; gap: 8px; }
  .log-time { color: var(--text-dim); min-width: 56px; flex-shrink: 0; }
  .log-msg  { color: var(--text); }
  .log-entry.ev-status .log-msg  { color: var(--green); }
  .log-entry.ev-stop   .log-msg  { color: var(--red); }
  .log-entry.ev-config .log-msg  { color: var(--blue); }
  .log-entry.ev-warn   .log-msg  { color: #fbbf24; }
  .log-entry.ev-conn   .log-msg  { color: var(--amber); }
  .log-entry.ev-error  .log-msg  { color: var(--red); }

  /* OLED override */
  .oled-preview {
    background: #0a1a06;
    border: 2px solid #1e3d16;
    border-radius: 4px;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 14px;
    color: #b7f7a0;
    text-shadow: 0 0 8px rgba(183,247,160,0.5);
    letter-spacing: 1px;
    margin-bottom: 8px;
    min-height: 60px;
    line-height: 1.8;
  }
  .oled-preview .oled-cursor { animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Param relevance */
  .param-chip {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 2px;
    font-size: 10px;
    letter-spacing: 1px;
    margin: 2px;
    border: 1px solid;
  }
  .param-chip.used   { border-color: var(--amber); color: var(--amber); }
  .param-chip.unused { border-color: var(--border); color: var(--text-dim); }

  .params-used {
    margin-top: 6px;
    padding: 6px 8px;
    background: #0a1015;
    border: 1px solid var(--border);
    border-radius: 2px;
  }

  /* divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 8px 0;
  }

  /* connected/disconnected overlay */
  #conn-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8,11,15,0.92);
    z-index: 9998;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #conn-overlay.show { display: flex; }
  .conn-spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .conn-label {
    font-family: var(--display);
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--amber);
  }

  /* Raw MQTT toggle */
  #raw-toggle {
    font-size: 10px;
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: none;
    border: none;
    font-family: var(--mono);
    padding: 0;
  }
  #raw-toggle:hover { color: var(--amber); }

  /* responsive */
  @media (max-width: 1100px) {
    #app { grid-template-columns: 280px 1fr 260px; }
  }
  @media (max-width: 900px) {
    #app {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto;
    }
    #mode-panel { grid-column: 1 / -1; grid-row: auto; }
    #mid-col    { grid-column: 1; grid-row: auto; }
    #right-col  { grid-column: 2; grid-row: auto; }
  }
</style>
</head>
<body>

<!-- Connection overlay -->
<div id="conn-overlay" class="show">
  <div class="conn-spinner"></div>
  <div class="conn-label">CONNECTING TO BROKER</div>
  <div style="font-size:11px;color:var(--text-dim);letter-spacing:2px;">TUBE ROCKER v5</div>
</div>

<!-- Top Bar -->
<div id="topbar">
  <div class="logo">
    TUBE ROCKER
    <span>ECKSTEIN — CONTROL DASHBOARD v5</span>
  </div>
  <div class="status-cluster">
    <div class="pill">
      <div class="dot" id="dot-mqtt"></div>
      <span id="lbl-mqtt">MQTT</span>
    </div>
    <div class="pill">
      <div class="dot" id="dot-device"></div>
      <span id="lbl-device">DEVICE</span>
    </div>
    <div class="pill" id="pill-motor">
      <div class="dot" id="dot-motor"></div>
      <span id="lbl-motor">IDLE</span>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="app">

  <!-- ── LEFT: Mode Selector ─────────────────────── -->
  <div class="panel" id="mode-panel">
    <div class="panel-header">
      MODE SELECTOR
      <span style="color:var(--text-dim);font-family:var(--mono);font-size:9px;letter-spacing:1px;" id="mode-sel-label">F1 SELECTED</span>
    </div>
    <div class="panel-body">
      <div class="mode-grid" id="mode-grid"></div>

      <div class="mode-desc" id="mode-desc-box">
        Select a mode to see its description.
      </div>

      <div class="params-used" id="params-used-box" style="margin-top:6px;"></div>

      <hr class="divider">

      <div class="ctrl-row">
        <button class="btn btn-start" id="btn-start" onclick="startMode()">▶ START</button>
        <button class="btn btn-stop"  id="btn-stop"  onclick="stopMotor()" disabled>■ STOP</button>
      </div>
    </div>
  </div>

  <!-- ── MIDDLE ──────────────────────────────────── -->
  <div id="mid-col">

    <!-- Progress / Status -->
    <div class="panel">
      <div class="panel-header">
        LIVE STATUS
        <span id="active-mode-lbl" style="color:var(--text-dim);font-family:var(--mono);font-size:10px;">—</span>
      </div>
      <div class="big-countdown stopped" id="big-clock">--:--</div>
      <div class="seg-label" id="seg-lbl">STANDBY</div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill"></div>
      </div>
    </div>

    <!-- Config -->
    <div class="panel">
      <div class="panel-header">
        CONFIGURATION
        <span style="font-family:var(--mono);font-size:9px;color:var(--text-dim);" id="lock-lbl"></span>
      </div>
      <div class="panel-body">
        <div class="cfg-grid" id="cfg-panel">

          <!-- Speed -->
          <div class="field-group">
            <label>SPEED %</label>
            <div class="range-row">
              <input type="range" id="sl-speed" min="1" max="100" value="50" oninput="onSpeedChange(this.value)">
              <div class="val-display" id="val-speed">50</div>
            </div>
          </div>

          <!-- Total Duration -->
          <div class="field-group">
            <label>TOTAL DURATION (MM:SS)</label>
            <input type="text" id="inp-total" value="01:00" maxlength="5"
                   oninput="onTotalChange(this.value)" placeholder="MM:SS">
          </div>

          <!-- Direction -->
          <div class="field-group">
            <label>DIRECTION</label>
            <div class="toggle-row">
              <button class="dir-btn active-fwd" id="dir-fwd" onclick="setDirection(1)">▶ FWD</button>
              <button class="dir-btn" id="dir-rev" onclick="setDirection(0)">◀ REV</button>
            </div>
          </div>

          <!-- Pause -->
          <div class="field-group">
            <label>PAUSE DURATION (sec)</label>
            <div class="range-row">
              <input type="range" id="sl-pause" min="1" max="60" value="2" oninput="onPauseChange(this.value)">
              <div class="val-display" id="val-pause">2</div>
            </div>
          </div>

          <!-- Shake Count -->
          <div class="field-group">
            <label>SHAKE COUNT</label>
            <div class="range-row">
              <input type="range" id="sl-shake" min="1" max="20" value="3" oninput="onShakeChange(this.value)">
              <div class="val-display" id="val-shake">3</div>
            </div>
          </div>

          <!-- Warning -->
          <div class="field-group full">
            <div class="warn-box" id="warn-box"></div>
          </div>

          <!-- Send All -->
          <div class="field-group full">
            <button class="btn btn-amber btn-full" id="btn-send-cfg" onclick="sendAllConfig()">
              ↑ PUSH ALL CONFIG TO DEVICE
            </button>
          </div>

        </div>
      </div>
    </div>

  </div><!-- end mid-col -->

  <!-- ── RIGHT ───────────────────────────────────── -->
  <div id="right-col">

    <!-- OLED Override -->
    <div class="panel">
      <div class="panel-header">OLED DISPLAY OVERRIDE</div>
      <div class="panel-body">
        <div class="oled-preview" id="oled-prev">
          <div id="oled-l1">Tube Rocker<span class="oled-cursor">_</span></div>
          <div id="oled-l2">by Eckstein</div>
        </div>
        <div class="field-group" style="margin-bottom:6px;">
          <label>LINE 1 (max 16 chars)</label>
          <input type="text" id="inp-l1" maxlength="16" value="Tube Rocker" oninput="updateOledPreview()">
        </div>
        <div class="field-group" style="margin-bottom:8px;">
          <label>LINE 2 (max 16 chars)</label>
          <input type="text" id="inp-l2" maxlength="16" value="by Eckstein" oninput="updateOledPreview()">
        </div>
        <button class="btn btn-blue btn-full" id="btn-oled" onclick="sendOled()">
          ↑ SEND TO DISPLAY
        </button>
      </div>
    </div>

    <!-- Activity Log -->
    <div class="panel" style="flex:1;">
      <div class="panel-header">
        ACTIVITY LOG
        <div style="display:flex;gap:8px;align-items:center;">
          <button id="raw-toggle" onclick="toggleRaw()">RAW: OFF</button>
          <button style="font-size:10px;color:var(--text-dim);cursor:pointer;letter-spacing:1px;text-transform:uppercase;background:none;border:none;font-family:var(--mono);" onclick="clearLog()">CLR</button>
        </div>
      </div>
      <div id="log-body"></div>
    </div>

  </div><!-- end right-col -->

</div><!-- end app -->

<script>
// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════

const BROKER    = 'wss://29d1db5d807d40109f45b518b9d3017d.s1.eu.hivemq.cloud:8884/mqtt';
const MQTT_USER = 'sanjana_tuberocker';
const MQTT_PASS = 'Sanjana_tuberocker01';
const CLIENT_ID = 'dashboard_' + Math.random().toString(16).slice(2,10);

const TOPICS = {
  CTRL:      'motor/control',
  MODE:      'motor/mode',
  STATUS:    'motor/status',
  PROGRESS:  'motor/progress',
  DISP:      'display/text',
  DEV:       'device/status',
  CFG_SPD:   'motor/config/speed',
  CFG_DIR:   'motor/config/direction',
  CFG_PAUSE: 'motor/config/pause_sec',
  CFG_SHAKE: 'motor/config/shake_cnt',
  CFG_TOTAL: 'motor/config/total_ms',
};

const SHAKE_CYCLE_MS = 1020; // 2*500 + 2*10

const MODE_INFO = [
  {
    name: 'F1', tag: 'Continuous',
    desc: '<strong>Spin only.</strong> Motor runs at set speed in one direction for the full duration. No interruptions.',
    uses: ['speed','direction','total'],
  },
  {
    name: 'F2', tag: 'Single Pause',
    desc: '<strong>Spin → Pause → Spin.</strong> One pause at the midpoint (T/2). Resumes and runs to completion.',
    uses: ['speed','direction','total','pause'],
  },
  {
    name: 'F3', tag: 'Double Pause',
    desc: '<strong>Spin → Pause → Spin → Pause → Spin.</strong> Two pauses at T/3 marks.',
    uses: ['speed','direction','total','pause'],
  },
  {
    name: 'F4', tag: 'Shake + Pause',
    desc: '<strong>Spin → Shake → Spin → Pause → Spin.</strong> Shake at T/3, pause at 2T/3.',
    uses: ['speed','direction','total','pause','shake'],
  },
  {
    name: 'F5', tag: 'Shake-Pause-Shake',
    desc: '<strong>Spin → Shake → Spin → Pause → Spin → Shake → Spin.</strong> Events at each T/4 mark.',
    uses: ['speed','direction','total','pause','shake'],
  },
  {
    name: 'F6', tag: 'Triple Shake',
    desc: '<strong>Spin → Shake × 3 evenly spaced.</strong> Three shakes at T/4, T/2, 3T/4. No pauses.',
    uses: ['speed','direction','total','shake'],
  },
  {
    name: 'F7', tag: 'Bi-dir + 3 Pauses',
    desc: '<strong>Repeating half-cycles flipping direction.</strong> Each half has 3 pauses at quarter marks within it.',
    uses: ['speed','total','pause'],
  },
  {
    name: 'F8', tag: 'Bi-dir Shake+Pause',
    desc: '<strong>Repeating half-cycles flipping direction.</strong> Each half: Shake → Shake → Pause. Runs continuously.',
    uses: ['speed','total','pause','shake'],
  },
  {
    name: 'F9', tag: 'Bi-dir Triple Shake',
    desc: '<strong>Repeating half-cycles flipping direction.</strong> Each half has 3 shakes. High-agitation mode.',
    uses: ['speed','total','shake'],
  },
];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════

let client       = null;
let motorRunning = false;
let deviceOnline = false;
let mqttConn     = false;
let selectedMode = 0;
let showRaw      = false;
let totalMs      = 60000;
let startedAt    = null;
let progressTimer= null;
let direction    = 1; // 1=fwd, 0=rev
let speedPct     = 50;
let pauseSec     = 2;
let shakeCount   = 3;

const LS_KEY = 'tuberocker_cfg';

// ═══════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════

function saveLocal() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      speedPct, direction, pauseSec, shakeCount,
      totalMs, selectedMode,
      oledL1: document.getElementById('inp-l1').value,
      oledL2: document.getElementById('inp-l2').value,
    }));
  } catch(e) {}
}

function loadLocal() {
  try {
    const d = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
    if (!d) return;
    speedPct    = d.speedPct    ?? 50;
    direction   = d.direction   ?? 1;
    pauseSec    = d.pauseSec    ?? 2;
    shakeCount  = d.shakeCount  ?? 3;
    totalMs     = d.totalMs     ?? 60000;
    selectedMode= d.selectedMode ?? 0;

    document.getElementById('sl-speed').value  = speedPct;
    document.getElementById('val-speed').textContent = speedPct;
    document.getElementById('sl-pause').value  = pauseSec;
    document.getElementById('val-pause').textContent = pauseSec;
    document.getElementById('sl-shake').value  = shakeCount;
    document.getElementById('val-shake').textContent = shakeCount;
    document.getElementById('inp-total').value = msToMMSS(totalMs);

    if (d.oledL1) document.getElementById('inp-l1').value = d.oledL1;
    if (d.oledL2) document.getElementById('inp-l2').value = d.oledL2;

    updateDir(direction);
    updateOledPreview();
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════

function msToMMSS(ms) {
  const s = Math.floor(ms / 1000);
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function mmssToMs(str) {
  const m = str.match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  const mm = parseInt(m[1]), ss = parseInt(m[2]);
  if (ss > 59 || mm > 99) return null;
  return (mm*60 + ss)*1000;
}

function now() {
  return new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ── Validation ──────────────────────────────────────
function getWindowMs(modeIdx) {
  const T = totalMs, half = T/2;
  switch(modeIdx) {
    case 0: return T;
    case 1: return T/2;
    case 2: return T/3;
    case 3: return T/3;
    case 4: return T/4;
    case 5: return T/4;
    case 6: return half/4;
    case 7: return half/4;
    case 8: return half/4;
    default: return T;
  }
}

function validateConfig() {
  const m   = MODE_INFO[selectedMode];
  const win = getWindowMs(selectedMode);
  const maxPause = Math.floor(win/1000);
  const maxShake = Math.floor(win/SHAKE_CYCLE_MS);
  const warnings = [];

  if (m.uses.includes('pause')) {
    if (pauseSec > maxPause)
      warnings.push(`⚠ Pause ${pauseSec}s exceeds window (max ${maxPause}s for ${m.name})`);
  }
  if (m.uses.includes('shake')) {
    if (shakeCount > maxShake)
      warnings.push(`⚠ Shake count ${shakeCount} exceeds window (max ${maxShake} for ${m.name})`);
  }

  const warnBox = document.getElementById('warn-box');
  if (warnings.length) {
    warnBox.innerHTML = warnings.join('<br>');
    warnBox.classList.add('show');
  } else {
    warnBox.classList.remove('show');
  }
}

// ═══════════════════════════════════════════════════════
// UI — MODE GRID
// ═══════════════════════════════════════════════════════

function buildModeGrid() {
  const grid = document.getElementById('mode-grid');
  grid.innerHTML = '';
  MODE_INFO.forEach((m, i) => {
    const btn = document.createElement('div');
    btn.className = 'mode-btn' + (i === selectedMode ? ' active' : '');
    btn.id = 'mode-btn-' + i;
    btn.innerHTML = `<span class="mode-name">${m.name}</span><span class="mode-tag">${m.tag}</span>`;
    btn.onclick = () => selectMode(i);
    grid.appendChild(btn);
  });
}

function selectMode(i) {
  if (motorRunning) return;
  selectedMode = i;
  document.querySelectorAll('.mode-btn').forEach((b,j) => {
    b.classList.toggle('active', j === i);
  });
  document.getElementById('mode-sel-label').textContent = MODE_INFO[i].name + ' SELECTED';
  document.getElementById('mode-desc-box').innerHTML = MODE_INFO[i].desc;

  // Params used chips
  const allParams = ['speed','direction','total','pause','shake'];
  const used = MODE_INFO[i].uses;
  document.getElementById('params-used-box').innerHTML =
    allParams.map(p => `<span class="param-chip ${used.includes(p)?'used':'unused'}">${p.toUpperCase()}</span>`).join('');

  // Dim sliders not relevant
  const slPause = document.getElementById('sl-pause');
  const slShake = document.getElementById('sl-shake');
  slPause.parentElement.parentElement.style.opacity = used.includes('pause') ? '1' : '0.3';
  slShake.parentElement.parentElement.style.opacity = used.includes('shake') ? '1' : '0.3';
  document.getElementById('dir-fwd').parentElement.parentElement.style.opacity =
    used.includes('direction') ? '1' : '0.3';

  validateConfig();
  saveLocal();
}

// ═══════════════════════════════════════════════════════
// UI — CONFIG CONTROLS
// ═══════════════════════════════════════════════════════

function onSpeedChange(v) {
  speedPct = parseInt(v);
  document.getElementById('val-speed').textContent = v;
  saveLocal();
}

function onPauseChange(v) {
  pauseSec = parseInt(v);
  document.getElementById('val-pause').textContent = v;
  validateConfig();
  saveLocal();
}

function onShakeChange(v) {
  shakeCount = parseInt(v);
  document.getElementById('val-shake').textContent = v;
  validateConfig();
  saveLocal();
}

function onTotalChange(v) {
  const ms = mmssToMs(v);
  const inp = document.getElementById('inp-total');
  if (ms !== null) {
    totalMs = ms;
    inp.classList.remove('warn');
  } else {
    inp.classList.add('warn');
  }
  validateConfig();
  saveLocal();
}

function setDirection(d) {
  direction = d;
  updateDir(d);
  saveLocal();
}

function updateDir(d) {
  direction = d;
  const fwd = document.getElementById('dir-fwd');
  const rev = document.getElementById('dir-rev');
  fwd.className = 'dir-btn' + (d === 1 ? ' active-fwd' : '');
  rev.className = 'dir-btn' + (d === 0 ? ' active-rev' : '');
}

function sendAllConfig() {
  if (!mqttConn) { addLog('Not connected to broker', 'ev-error'); return; }
  const ms = mmssToMs(document.getElementById('inp-total').value);
  if (ms === null) { addLog('Invalid total duration — fix MM:SS format', 'ev-warn'); return; }

  publish(TOPICS.CFG_SPD,   String(speedPct));
  publish(TOPICS.CFG_DIR,   direction === 1 ? 'fwd' : 'rev');
  publish(TOPICS.CFG_PAUSE, String(pauseSec));
  publish(TOPICS.CFG_SHAKE, String(shakeCount));
  publish(TOPICS.CFG_TOTAL, msToMMSS(ms));

  addLog(`Config pushed → spd:${speedPct}% dir:${direction?'FWD':'REV'} pause:${pauseSec}s shake:${shakeCount}x total:${msToMMSS(ms)}`, 'ev-config');
}

// ═══════════════════════════════════════════════════════
// UI — MOTOR CONTROL
// ═══════════════════════════════════════════════════════

function startMode() {
  if (motorRunning || !mqttConn) return;
  const mode = MODE_INFO[selectedMode].name;
  publish(TOPICS.MODE, mode);
  addLog(`▶ Start command sent → ${mode}`, 'ev-status');
}

function stopMotor() {
  if (!motorRunning) return;
  publish(TOPICS.CTRL, 'stop');
  addLog('■ Stop command sent', 'ev-stop');
}

// ═══════════════════════════════════════════════════════
// UI — OLED
// ═══════════════════════════════════════════════════════

function updateOledPreview() {
  const l1 = document.getElementById('inp-l1').value || '';
  const l2 = document.getElementById('inp-l2').value || '';
  document.getElementById('oled-l1').innerHTML = l1 + '<span class="oled-cursor">_</span>';
  document.getElementById('oled-l2').textContent = l2;
  saveLocal();
}

function sendOled() {
  if (!mqttConn) { addLog('Not connected', 'ev-error'); return; }
  const l1 = document.getElementById('inp-l1').value;
  const l2 = document.getElementById('inp-l2').value;
  publish(TOPICS.DISP, `${l1}|${l2}`);
  addLog(`OLED → "${l1}" / "${l2}"`, 'ev-config');
}

// ═══════════════════════════════════════════════════════
// UI — STATUS UPDATES
// ═══════════════════════════════════════════════════════

function setMotorStatus(status, modeName) {
  const dot   = document.getElementById('dot-motor');
  const lbl   = document.getElementById('lbl-motor');
  const clock = document.getElementById('big-clock');
  const seg   = document.getElementById('seg-lbl');
  const actLbl= document.getElementById('active-mode-lbl');

  switch(status) {
    case 'running':
      motorRunning = true;
      dot.className = 'dot amber';
      lbl.textContent = 'RUNNING';
      clock.classList.remove('stopped','completed');
      actLbl.textContent = modeName || '—';
      startedAt = Date.now();
      startProgressTimer();
      lockUI(true);
      break;
    case 'stopped':
      motorRunning = false;
      dot.className = 'dot red';
      lbl.textContent = 'STOPPED';
      clock.classList.add('stopped');
      clock.classList.remove('completed');
      clock.textContent = '--:--';
      seg.innerHTML = 'STOPPED';
      document.getElementById('prog-fill').style.width = '0%';
      actLbl.textContent = '—';
      stopProgressTimer();
      lockUI(false);
      break;
    case 'completed':
      motorRunning = false;
      dot.className = 'dot green';
      lbl.textContent = 'DONE';
      clock.classList.add('completed');
      clock.classList.remove('stopped');
      clock.textContent = '00:00';
      seg.innerHTML = '<span style="color:var(--green)">✓ COMPLETED</span>';
      document.getElementById('prog-fill').style.width = '100%';
      actLbl.textContent = '—';
      stopProgressTimer();
      lockUI(false);
      break;
  }
}

function parseProgress(msg) {
  // Format: "F3 01:42 left"
  const m = msg.match(/^(\w+)\s+(\d{2}:\d{2})\s+left$/);
  if (!m) return null;
  return { mode: m[1], timeLeft: m[2] };
}

function updateProgress(msg) {
  const p = parseProgress(msg);
  if (!p) return;

  const clock = document.getElementById('big-clock');
  clock.textContent = p.timeLeft;
  clock.classList.remove('stopped','completed');

  const seg  = document.getElementById('seg-lbl');
  seg.innerHTML = `MODE <span class="seg-hi">${p.mode}</span> — RUNNING`;

  // Progress bar (approximate based on remaining vs total)
  const parts = p.timeLeft.split(':');
  const remMs = (parseInt(parts[0])*60 + parseInt(parts[1])) * 1000;
  const elapsed = totalMs - remMs;
  const pct = Math.max(0, Math.min(100, (elapsed / totalMs) * 100));
  document.getElementById('prog-fill').style.width = pct + '%';
}

function startProgressTimer() {
  stopProgressTimer();
  // Tick the clock locally while running (progress topic updates every 500ms)
}

function stopProgressTimer() {
  if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
}

function setMqttStatus(connected) {
  mqttConn = connected;
  const dot = document.getElementById('dot-mqtt');
  const lbl = document.getElementById('lbl-mqtt');
  dot.className = 'dot ' + (connected ? 'green' : 'red');
  lbl.textContent = connected ? 'MQTT' : 'OFFLINE';

  const overlay = document.getElementById('conn-overlay');
  overlay.classList.toggle('show', !connected);
}

function setDeviceStatus(online) {
  deviceOnline = online;
  const dot = document.getElementById('dot-device');
  const lbl = document.getElementById('lbl-device');
  dot.className = 'dot ' + (online ? 'green' : 'red');
  lbl.textContent = online ? 'ONLINE' : 'OFFLINE';
}

function lockUI(locked) {
  const els = ['btn-start','btn-send-cfg','btn-oled',
                'sl-speed','sl-pause','sl-shake','inp-total',
                'dir-fwd','dir-rev'];
  els.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = locked;
  });
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('locked', locked));
  document.getElementById('btn-stop').disabled = !locked;
  document.getElementById('lock-lbl').textContent = locked ? '🔒 LOCKED — MOTOR RUNNING' : '';
}

// ═══════════════════════════════════════════════════════
// ACTIVITY LOG
// ═══════════════════════════════════════════════════════

function addLog(msg, cls='') {
  const body = document.getElementById('log-body');
  const row  = document.createElement('div');
  row.className = 'log-entry ' + cls;
  row.innerHTML = `<span class="log-time">${now()}</span><span class="log-msg">${msg}</span>`;
  body.appendChild(row);
  body.scrollTop = body.scrollHeight;

  // Cap log at 200 entries
  while (body.children.length > 200) body.removeChild(body.firstChild);
}

function clearLog() { document.getElementById('log-body').innerHTML = ''; }

function toggleRaw() {
  showRaw = !showRaw;
  document.getElementById('raw-toggle').textContent = 'RAW: ' + (showRaw ? 'ON' : 'OFF');
}

// ═══════════════════════════════════════════════════════
// MQTT
// ═══════════════════════════════════════════════════════

function publish(topic, payload) {
  if (!client || !mqttConn) return;
  client.publish(topic, payload, { qos: 1 });
  if (showRaw) addLog(`↑ [${topic}] ${payload}`, 'ev-config');
}

function initMqtt() {
  addLog('Connecting to HiveMQ broker...', 'ev-conn');

  client = mqtt.connect(BROKER, {
    username:        MQTT_USER,
    password:        MQTT_PASS,
    clientId:        CLIENT_ID,
    keepalive:       30,
    reconnectPeriod: 5000,
    connectTimeout:  15000,
  });

  client.on('connect', () => {
    setMqttStatus(true);
    addLog('Connected to MQTT broker', 'ev-conn');

    const subs = [TOPICS.STATUS, TOPICS.PROGRESS, TOPICS.DEV];
    client.subscribe(subs, { qos: 1 }, (err) => {
      if (err) addLog('Subscribe error: ' + err.message, 'ev-error');
      else addLog('Subscribed to motor/status, motor/progress, device/status', 'ev-conn');
    });
  });

  client.on('reconnect', () => {
    addLog('Reconnecting...', 'ev-warn');
    setMqttStatus(false);
  });

  client.on('offline',    () => { setMqttStatus(false); addLog('MQTT client offline', 'ev-error'); });
  client.on('error', (e) => { addLog('MQTT error: ' + e.message, 'ev-error'); });
  client.on('close',      () => { setMqttStatus(false); });

  client.on('message', (topic, message) => {
    const msg = message.toString();
    if (showRaw) addLog(`↓ [${topic}] ${msg}`, '');

    switch(topic) {
      case TOPICS.STATUS:
        if (msg === 'running') {
          setMotorStatus('running', null);
          addLog('▶ Motor running', 'ev-status');
        } else if (msg === 'stopped') {
          setMotorStatus('stopped', null);
          addLog('■ Motor stopped', 'ev-stop');
        } else if (msg === 'completed') {
          setMotorStatus('completed', null);
          addLog('✓ Pattern completed', 'ev-status');
        }
        break;

      case TOPICS.PROGRESS:
        updateProgress(msg);
        break;

      case TOPICS.DEV:
        if (msg === 'online') {
          setDeviceStatus(true);
          addLog('Device came online', 'ev-conn');
        } else if (msg === 'offline') {
          setDeviceStatus(false);
          addLog('Device went offline (LWT)', 'ev-warn');
        }
        break;
    }
  });
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  buildModeGrid();
  loadLocal();
  selectMode(selectedMode);
  updateOledPreview();
  lockUI(false);
  initMqtt();
});
</script>
